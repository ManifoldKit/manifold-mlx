name: Release Please

# Thin shim over the org reusable workflow — see
# https://github.com/ManifoldKit/.github/blob/main/WORKFLOWS.md
# for what companion-release-please.yml actually does (wraps
# googleapis/release-please-action).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    uses: ManifoldKit/.github/.github/workflows/companion-release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
