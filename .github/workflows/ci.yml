name: CI

on:
  # Skip the heavy macOS build+test on docs/version-only changes — notably
  # release-please PRs and their merge commits, which touch only CHANGELOG.md
  # and .release-please-manifest.json. `test` is a required check, so a skipped
  # release PR stays BLOCKED and must be admin-merged (gh api PUT .../merge) —
  # which is already the release flow (Highlights rewrite is hand-merged). Any
  # PR touching Sources/Package/etc. is unaffected and still runs the gate.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    uses: ManifoldKit/.github/.github/workflows/swift-ci.yml@main

  # Real-model MLX integration tests are NOT run in CI: they need Apple
  # Silicon Metal plus multi-GB local model snapshots that hosted runners
  # don't have, and `xcodebuild` env-var patching (scripts/
  # test-mlx-integration.sh). This stub exists so the lane can be triggered
  # manually on a self-hosted runner if one ever materializes; nothing is
  # scheduled.
  integration-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode 26 toolchain
        # The image default (Xcode 16.4 / Swift 6.1) mis-resolves the
        # dependency graph: its SwiftPM does not prune AnyLanguageModel's
        # trait-disabled mlx-swift-lm 2.x edge inside core, producing a bogus
        # "could not be resolved" conflict with mlx-swift-lm 3.x. Swift 6.3
        # (Xcode 26.3) prunes it correctly — same toolchain as the local gate.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer"
          swift --version
      - name: Run MLX integration tests
        run: scripts/test-mlx-integration.sh
