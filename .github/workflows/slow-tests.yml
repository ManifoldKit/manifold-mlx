name: Slow Tests (Nightly)

# Runs the full ManifoldMLXTests target nightly with RUN_SLOW_TESTS=1, on a
# hosted macos-15 runner (no pinned MLX model on disk, no
# MANIFOLD_DISCOVER_LOCAL_MODELS opt-in).
#
# This does NOT produce real-model signal for the two
# LocalBackendContractRunner generation scenarios in
# MLXLocalBackendContractTests (test_generate_simplePrompt_emitsTokensInOrder,
# test_generate_stopsGenerating_afterStreamEnd) — with no model discoverable,
# `skipUnlessRealModelAvailable()` skips them cleanly. That real-model lane
# is model-tests.yml, gated on a self-hosted Apple Silicon runner that does
# not exist yet (workflow_dispatch-only in practice — see its own header).
# This lane's value is running every OTHER RUN_SLOW_TESTS-gated / fast-lane
# test in the target on a schedule, as a nightly backstop independent of
# per-PR CI.
#
# There is no automated tool in this repo (or core) for re-recording
# Tests/Fixtures/backends/mlx/streaming/simple-prompt/expected.jsonl — core's
# scripts/record-fixture.sh takes a different (redaction-pipe) interface and
# does not apply here. To re-record by hand: on Apple Silicon with a real MLX
# model discoverable (MLX_TEST_MODEL / MANIFOLD_DISCOVER_LOCAL_MODELS=1), run
# the participant's generate() call directly (see
# MLXLocalBackendContractTests.makeBackend) against the model, capture the
# emitted GenerationEvent stream, and hand-write it as one JSON object per
# line into expected.jsonl (see Tests/Fixtures/backends/mlx/README.md for the
# line format).
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  slow-tests:
    runs-on: macos-15
    env:
      RUN_SLOW_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode 26 toolchain
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer"
          swift --version
      - name: Cache SwiftPM dependency material
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            .build/artifacts
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-
      - name: Build
        run: swift build
      - name: Test (slow lane)
        run: swift test --filter ManifoldMLXTests
