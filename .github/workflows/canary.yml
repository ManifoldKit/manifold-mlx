name: Canary (core main)

# Re-resolves against roryford/ManifoldKit main and builds+tests from scratch.
# A failure here means the core seam moved — not that this repo regressed.
on:
  schedule:
    - cron: "17 4 * * 1"   # weekly, Monday 04:17 UTC (quiet hour)
  workflow_dispatch:
  repository_dispatch:
    types: [core-release]

permissions:
  contents: read

jobs:
  canary:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode 26 toolchain
        # The image default (Xcode 16.4 / Swift 6.1) mis-resolves the
        # dependency graph: its SwiftPM does not prune AnyLanguageModel's
        # trait-disabled mlx-swift-lm 2.x edge inside core, producing a bogus
        # "could not be resolved" conflict with mlx-swift-lm 3.x. Swift 6.3
        # (Xcode 26.3) prunes it correctly — same toolchain as the local gate.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer"
          swift --version
      - name: Drop lockfile and re-resolve against core main
        run: |
          rm -f Package.resolved
          swift package resolve
      - name: Build
        run: swift build
      - name: Test
        # NO --parallel (process-global claims registry; see ci.yml).
        run: swift test
