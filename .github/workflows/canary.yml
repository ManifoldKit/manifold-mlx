name: Canary (core main)

# Thin shim over the org reusable workflow — see
# https://github.com/ManifoldKit/.github/blob/main/WORKFLOWS.md
# for what companion-canary.yml actually does (builds + tests this repo
# against ManifoldKit/ManifoldKit's core-ref HEAD via swift package edit).

on:
  schedule:
    - cron: "17 4 * * *"   # nightly, 04:17 UTC (quiet hour)
  workflow_dispatch:
  repository_dispatch:
    types: [core-release]

jobs:
  canary:
    uses: ManifoldKit/.github/.github/workflows/companion-canary.yml@main
