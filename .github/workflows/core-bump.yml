name: Bump core pin (on ManifoldKit release)

# Thin shim over the org reusable workflow — see
# https://github.com/ManifoldKit/.github/blob/main/WORKFLOWS.md
# for what companion-core-bump.yml actually does. All step-level logic
# (pin rewrite, build/test gate, PR open + admin-merge) lives there now.

on:
  repository_dispatch:
    types: [core-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "ManifoldKit tag to pin to (e.g. v0.63.0)"
        required: true
        type: string

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - id: tag
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${DISPATCH_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag supplied by dispatch payload or workflow input." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' did not yield an X.Y.Z version." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  bump:
    needs: resolve
    uses: ManifoldKit/.github/.github/workflows/companion-core-bump.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      version: ${{ needs.resolve.outputs.version }}
      pin-mode: upToNextMinor
    secrets: inherit
